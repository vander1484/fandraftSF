name: Update FPL Snapshot

"on":
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * *"

permissions:
  contents: write

jobs:
  update-fpl-snapshot:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Update FPL player snapshot
        run: python scripts/update_fpl_snapshot.py

      - name: Commit updated snapshot
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Update FPL player snapshot
          file_pattern: data/fpl-players.json
